name: test

on:
  push:
    paths:
      - 'matcher_py/src/**'
      - 'matcher_py/test/**'
      - 'matcher_py/python/**'
      - 'matcher_py/build.rs'
      - 'matcher_py/Cargo.toml'
      - 'matcher_py/pyproject.toml'
      - 'matcher_rs/src/**'
      - 'matcher_rs/tests/**'
      - 'matcher_rs/process_map/**'
      - 'matcher_rs/build.rs'
      - 'matcher_rs/Cargo.toml'
      - 'matcher_c/src/**'
      - 'matcher_c/Cargo.toml'
      - 'matcher_java/rust_src/**'
      - 'matcher_java/src/**'
      - 'matcher_java/Cargo.toml'
      - 'matcher_java/pom.xml'
      - '.github/workflows/test.yml'
      - '.cargo/config.toml'
  pull_request:
    paths:
      - 'matcher_py/src/**'
      - 'matcher_py/test/**'
      - 'matcher_py/python/**'
      - 'matcher_py/build.rs'
      - 'matcher_py/Cargo.toml'
      - 'matcher_py/pyproject.toml'
      - 'matcher_rs/src/**'
      - 'matcher_rs/tests/**'
      - 'matcher_rs/process_map/**'
      - 'matcher_rs/build.rs'
      - 'matcher_rs/Cargo.toml'
      - 'matcher_c/src/**'
      - 'matcher_c/Cargo.toml'
      - 'matcher_java/rust_src/**'
      - 'matcher_java/src/**'
      - 'matcher_java/Cargo.toml'
      - 'matcher_java/pom.xml'
      - '.github/workflows/test.yml'
      - '.cargo/config.toml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: so
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: so
          - runner: macos-latest
            target: aarch64-apple-darwin
            suffix: dylib
          - runner: windows-latest
            target: x86_64-pc-windows-gnu
            suffix: dll
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: dll
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          target: ${{ matrix.platform.target }}
      - name: Install cargo-all-features
        run: cargo install cargo-all-features
      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Install boost
        if: runner.os != 'Windows' && matrix.platform.target != 'aarch64-unknown-linux-gnu'
        uses: MarkusJx/install-boost@v2
        id: install-boost
        with:
          boost_version: 1.89.0
      - name: Test
        if: runner.os != 'Windows' && matrix.platform.target != 'aarch64-unknown-linux-gnu'
        run: |
          cargo doc
          cargo all-features test
        env:
          BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}
          RUST_BACKTRACE: 1
      - name: Test (Windows & Linux Arm, no vectorscan)
        if: runner.os == 'Windows' || matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo doc
          cargo test --no-default-features
          cargo test --features dfa
          cargo test --features runtime_build
          cargo test --features dfa,runtime_build

      - name: Rename & move
        shell: bash
        run: |
          cp ./target/${{ matrix.platform.target }}/release/*matcher_c.${{ matrix.platform.suffix }} matcher_c/matcher_c.so
          cp ./target/${{ matrix.platform.target }}/release/*matcher_java.${{ matrix.platform.suffix }} matcher_java/src/main/resources/matcher_java.${{ matrix.platform.suffix }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: "-Z threads=2 -D warnings"
        with:
          target: ${{ matrix.platform.target }}
          args: --release -i python3.13
          sccache: 'true'
          rust-toolchain: nightly
          working-directory: matcher_py
      - name: Python Test
        shell: bash
        run: |
          pip install -U pytest typing_extensions
          pip install ./target/wheels/*.whl
          pytest matcher_py/test

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Java Test
        run: mvn test
        working-directory: matcher_java
