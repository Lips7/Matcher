[package]
name = "matcher_rs"
authors.workspace = true
categories.workspace = true
description.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true
readme = "README.md"
documentation = "https://docs.rs/crate/matcher_rs/latest"
build = "build.rs"

[package.metadata.docs.rs]
rustc-args = ["-C", "target-feature=native"]
rustdoc-args = ["-C", "target-feature=native", "--document-private-items"]

[lib]
name = "matcher_rs"
crate-type = ["rlib"]

[dependencies]
aho-corasick = "1.1.4"
bitflags = "2.11.0"
daachorse = "1.0.0"
mimalloc = { version = "0.1.48", features = ["v3"] }
serde = { version = "1.0.228", features = ["derive"] }
tinyvec = { version = "1.10.0", features = ["alloc"] }

[build-dependencies]
daachorse = "1.0.0"

[dev-dependencies]
divan = "0.1.21"
paste = "1.0"
proptest = "1.10.0"

[features]
default = ["dfa", "simd_runtime_dispatch"]
# By enable runtime_build feature, we could build process matcher at runtime, but with build time increasing.
runtime_build = []
# By enable dfa feature, we could use dfa to perform simple matching, but with significantly increasing memory consumption.
dfa = []
# By enable simd_runtime_dispatch feature, we select the best available transform kernel at runtime.
simd_runtime_dispatch = []

[[bench]]
name = "bench"
harness = false
