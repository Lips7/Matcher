[package]
name = "matcher_rs"
authors.workspace = true
categories.workspace = true
description.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true
readme = "README.md"
documentation = "https://docs.rs/crate/matcher_rs/latest"
build = "build.rs"

[package.metadata.docs.rs]
rustc-args = ["-C", "target-feature=native"]
rustdoc-args = ["-C", "target-feature=native", "--document-private-items"]

[lib]
name = "matcher_rs"
crate-type = ["rlib"]

[dependencies]
aho-corasick = "1.1.4"
bitflags = "2.11.0"
daachorse = "1.0.0"
mimalloc = { version = "0.1.48", features = ["v3"] }
parking_lot = { version = "0.12.5", features = ["hardware-lock-elision"] }
rapidfuzz = "0.5.0"
regex = { version = "1.12.3", features = ["perf-dfa-full"] }
rustc-hash = "2.1.1"
serde = { version = "1.0.228", features = ["derive"] }
tinyvec = { version = "1.10.0", features = ["alloc"] }
vectorscan-rs-sys = { version = "0.0.5", optional = true }

[build-dependencies]
daachorse = "1.0.0"

[dev-dependencies]
divan = "0.1.21"
fastrand = "2.3.0"
proptest = "1.10.0"

[features]
default = ["vectorscan", "dfa"]
# By enable runtime_build feature, we could build process matcher at runtime, but with build time increasing.
runtime_build = []
# By enable dfa feature, we could use dfa to perform simple matching, but with significantly increasing memory consumption.
dfa = []
# By enable vectorscan feature, we could use vectorscan to perform simple and regex matching.
vectorscan = ["vectorscan-rs-sys"]

[[bench]]
name = "bench"
harness = false
