repos:
  - repo: local
    hooks:
      - id: make-lint-rs
        name: make lint-rs
        entry: make lint-rs
        language: system
        files: \.rs$
        pass_filenames: false
      - id: make-lint-py
        name: make lint-py
        entry: make lint-py
        language: system
        files: \.py$
        pass_filenames: false
      - id: make-lint-java
        name: make lint-java
        entry: make lint-java
        language: system
        files: \.java$
        pass_filenames: false
