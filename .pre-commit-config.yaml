repos:
  - repo: local
    hooks:
      # Workspace-wide format check — fast (<1s), any .rs change
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        files: \.rs$
        pass_filenames: false

      # Workspace-wide clippy: all crates, all targets (tests, benches, examples)
      - id: clippy
        name: clippy
        entry: cargo all-features clippy --workspace --all-targets -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false

      # Workspace-wide doc build
      - id: doc
        name: doc
        entry: cargo doc --workspace --all-features --no-deps
        language: system
        files: ^matcher_rs/
        pass_filenames: false

      # Python: ruff + ty
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd matcher_py && uv run ruff check --fix'
        language: system
        files: ^matcher_py/.*\.py$
        pass_filenames: false

      - id: ty-check
        name: ty check
        entry: bash -c 'cd matcher_py && uv run ty check'
        language: system
        files: ^matcher_py/.*\.py$
        pass_filenames: false

      - id: ty-check-scripts
        name: ty check scripts
        entry: bash -c 'cd matcher_rs/scripts && uv run ty check'
        language: system
        files: ^matcher_rs/scripts/.*\.py$
        pass_filenames: false

      # Java: checkstyle
      - id: checkstyle-matcher-java
        name: java checkstyle
        entry: bash -c 'cd matcher_java && mvn checkstyle:check'
        language: system
        files: ^matcher_java/.*\.java$
        pass_filenames: false
